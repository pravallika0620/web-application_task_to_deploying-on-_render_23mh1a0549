<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="logo">MyWebApp</div>
            <ul>
                <li class="active">Overview</li>
                <li>Analytics</li>
                <li>Users</li>
                <li>Settings</li>
            </ul>
        </nav>

        <main class="main-content">
            <header>
                <h2>System Overview</h2>
                <div class="user-profile">Pravallika 👤</div>
            </header>

            <div class="stats-grid">
                <div class="stat-box">
                    <h3>Status</h3>
                    <p id="status" class="offline">System Offline</p>
                </div>
                <div class="stat-box">
                    <h3>Total Users</h3>
                    <p>1,250</p>
                </div>
                <div class="stat-box">
                    <h3>Server Load</h3>
                    <p>12%</p>
                </div>
            </div>

            <div class="control-panel">
                <h3>Actions</h3>
                <button id="action-btn">Initialize System</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
